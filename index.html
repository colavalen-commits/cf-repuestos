<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1F4E79">
<title>CF Repuestos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1F4E79;--blue-light:#2e6fad;--accent:#e8f4fd;--bg:#f4f6f8;--card:#fff;--text:#1a1a2e;--sub:#666;--border:#e0e0e0;--interno:#d6e4f0;--interno-txt:#1F4E79;--original:#fff3e0;--original-txt:#e65100;--nota:#fff8e1}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--blue);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.login-box{background:#fff;border-radius:18px;padding:32px 28px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.25)}
.login-logo{font-size:2.5rem;text-align:center;margin-bottom:6px}
.login-box h2{text-align:center;font-size:1.2rem;color:var(--blue);margin-bottom:4px}
.login-box p{text-align:center;font-size:0.8rem;color:#888;margin-bottom:22px}
.login-box input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;margin-bottom:12px;outline:none;font-family:inherit;transition:border-color 0.2s}
.login-box input:focus{border-color:var(--blue)}
.login-box button{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.login-box button:active{background:#163a5c}
.login-error{color:#d32f2f;font-size:0.82rem;text-align:center;margin-top:10px;display:none}

/* HEADER */
header{background:var(--blue);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
header h1{font-size:1.15rem;font-weight:700}
.header-count{font-size:0.75rem;opacity:0.75;margin-top:1px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:none;border-radius:10px;font-size:1rem;background:rgba(255,255,255,0.18);color:#fff;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,0.6)}
.search-wrap input:focus{background:rgba(255,255,255,0.25)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.7}

/* FILTERS */
.filters{display:flex;gap:8px;padding:10px 12px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:0.8rem;font-weight:500;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* SORT */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 4px;font-size:0.78rem;color:var(--sub)}
.sort-btn button{border:none;background:none;font-size:0.78rem;color:var(--sub);cursor:pointer;padding:2px 6px;border-radius:4px}
.sort-btn button.active{color:var(--blue);font-weight:600;background:var(--accent)}

/* CARDS */
.list{padding:6px 10px 80px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden;cursor:pointer;transition:transform 0.1s}
.card:active{transform:scale(0.98)}
.card-main{padding:12px 14px 10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:0.95rem;font-weight:600;line-height:1.3;flex:1}
.card-price{font-size:1rem;font-weight:700;color:var(--blue);white-space:nowrap}
.card-price .currency{font-size:0.72rem;font-weight:500;opacity:0.7}
.card-meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;align-items:center}
.badge{font-size:0.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-interno{background:var(--interno);color:var(--interno-txt)}
.badge-sin_codigo{background:#e8f5e9;color:#1E5C3A}
.badge-original{background:var(--original);color:var(--original-txt)}
.badge-proveedor{background:#f0f0f0;color:#555;font-weight:400}
.card-code{font-size:0.75rem;color:var(--sub);font-family:monospace}
.card-nota{background:var(--nota);padding:7px 14px;font-size:0.75rem;color:#7a6000;border-top:1px solid #ffe082;line-height:1.4}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px);animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.modal-header{padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.modal-title{font-size:1.05rem;font-weight:700;line-height:1.3}
.modal-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.modal-body{padding:16px 18px}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:0.88rem}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--sub)}
.detail-value{font-weight:600;text-align:right;max-width:60%}
.detail-value.highlight{color:var(--blue);font-size:1.05rem}
.detail-value.green{color:#1E5C3A}
.modal-nota{background:var(--nota);border-radius:8px;padding:10px 12px;font-size:0.8rem;color:#7a6000;margin-top:14px;line-height:1.5}
.modal-nota strong{display:block;margin-bottom:4px}
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .emoji{font-size:2.5rem;margin-bottom:12px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔩</div>
    <h2>CF Repuestos</h2>
    <p>Ingresá tus credenciales para continuar</p>
    <input type="text" id="lu" placeholder="Usuario" autocomplete="username" autocorrect="off" autocapitalize="off">
    <input type="password" id="lp" placeholder="Contraseña" autocomplete="current-password">
    <button onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="lerr">Usuario o contraseña incorrectos</div>
  </div>
</div>

<header>
  <div class="header-top">
    <span style="font-size:1.5rem">🔩</span>
    <div>
      <h1>CF Repuestos</h1>
      <div class="header-count" id="hcount">293 productos</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Buscar producto, código, proveedor..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</header>

<div class="filters">
  <div class="chip active" data-filter="all">Todos</div>
  <div class="chip" data-filter="INTERNO">Cód. Interno</div>
  <div class="chip" data-filter="ORIGINAL">Cód. Original</div>
  <div class="chip" data-filter="SIN_CODIGO">Sin código</div>
  <div class="chip" data-filter="COVEMA">COVEMA</div>
</div>

<div class="sort-bar">
  <span id="rcount">293 resultados</span>
  <div class="sort-btn">
    <button onclick="setSort('name')" id="sort-name" class="active">A-Z</button>
    <button onclick="setSort('price')" id="sort-price">Precio</button>
    <button onclick="setSort('date')" id="sort-date">Reciente</button>
  </div>
</div>

<div class="list" id="list"></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="mtitle"></div>
      <div class="modal-badges" id="mbadges"></div>
    </div>
    <div class="modal-body" id="mbody"></div>
  </div>
</div>

let filter='all',sort='name',q='';

function isCovema(p){return p.proveedor&&p.proveedor.toUpperCase().includes('COVEMA')}
function ftype(p){return isCovema(p)?'COVEMA':p.tipo}

function render(){
  const f=PRODUCTS.filter(p=>{
    if(filter!=='all'&&ftype(p)!==filter)return false;
    if(!q)return true;
    const s=q.toLowerCase();
    return p.articulo.toLowerCase().includes(s)||p.codigo.toLowerCase().includes(s)||p.proveedor.toLowerCase().includes(s)||p.clientes.toLowerCase().includes(s);
  }).sort((a,b)=>{
    if(sort==='name')return a.articulo.localeCompare(b.articulo,'es');
    if(sort==='price')return(b.precio||0)-(a.precio||0);
    if(sort==='date'){const pa=a.ultimaVenta?a.ultimaVenta.split('/').reverse().join(''):'';const pb=b.ultimaVenta?b.ultimaVenta.split('/').reverse().join(''):'';return pb.localeCompare(pa);}
    return 0;
  });
  document.getElementById('rcount').textContent=f.length+' resultado'+(f.length!==1?'s':'');
  const list=document.getElementById('list');
  if(!f.length){list.innerHTML='<div class="empty"><div class="emoji">🔍</div><p>No se encontraron productos</p></div>';return;}
  const clsMap={INTERNO:'badge-interno',ORIGINAL:'badge-original',SIN_CODIGO:'badge-sin_codigo',COVEMA:'badge-sin_codigo'};
  const lblMap={INTERNO:'CF',ORIGINAL:'',SIN_CODIGO:'Sin cód.',COVEMA:'COVEMA'};
  list.innerHTML=f.map(p=>{
    const t=ftype(p);
    const lbl=t==='ORIGINAL'?(p.codigo||'Orig'):lblMap[t];
    return`<div class="card" onclick="openModal(${PRODUCTS.indexOf(p)})">
      <div class="card-main">
        <div class="card-top">
          <div class="card-name">${p.articulo}</div>
          <div class="card-price"><span class="currency">${p.moneda||'USD'} </span>${p.precio?p.precio.toLocaleString('es-AR',{minimumFractionDigits:0}):'—'}</div>
        </div>
        <div class="card-meta">
          <span class="badge ${clsMap[t]}">${lbl}</span>
          ${p.codigo&&t!=='SIN_CODIGO'&&t!=='COVEMA'?`<span class="card-code">${p.codigo}</span>`:''}
          ${p.proveedor?`<span class="badge badge-proveedor">${p.proveedor.length>22?p.proveedor.slice(0,20)+'…':p.proveedor}</span>`:''}
        </div>
      </div>
      ${p.notas?`<div class="card-nota">⚠️ ${p.notas.slice(0,120)}${p.notas.length>120?'…':''}</div>`:''}
    </div>`;
  }).join('');
}

function openModal(idx){
  const p=PRODUCTS[idx];
  const t=ftype(p);
  const clsMap={INTERNO:'badge-interno',ORIGINAL:'badge-original',SIN_CODIGO:'badge-sin_codigo',COVEMA:'badge-sin_codigo'};
  const lblMap={INTERNO:'Código Interno',ORIGINAL:'Cód. Original',SIN_CODIGO:'Sin código',COVEMA:'COVEMA'};
  document.getElementById('mtitle').textContent=p.articulo;
  document.getElementById('mbadges').innerHTML=`<span class="badge ${clsMap[t]}">${lblMap[t]}</span>${p.proveedor?`<span class="badge badge-proveedor">${p.proveedor}</span>`:''}`;
  const rows=[
    p.codigo?['Código',p.codigo]:null,
    ['Precio de venta',p.precio?`${p.moneda||'USD'} ${p.precio.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—','highlight'],
    p.costo?['Costo',`${p.monedaCosto||p.moneda} ${p.costo.toLocaleString('es-AR',{minimumFractionDigits:2})}`]:null,
    p.margen!=null?['Margen',p.margen+'%','green']:null,
    p.proveedor?['Proveedor',p.proveedor]:null,
    p.clientes?['Clientes',p.clientes]:null,
    p.ultimaVenta?['Última venta',p.ultimaVenta]:null,
  ].filter(Boolean);
  document.getElementById('mbody').innerHTML=rows.map(([l,v,c])=>`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value ${c||''}">${v}</span></div>`).join('')+(p.notas?`<div class="modal-nota"><strong>⚠️ Distintos precios registrados</strong>${p.notas.replace('Precios distintos: ','')}</div>`:'');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').scrollTop=0;
}

function closeModal(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}
function setSort(s){sort=s;document.querySelectorAll('.sort-btn button').forEach(b=>b.classList.remove('active'));document.getElementById('sort-'+s).classList.add('active');render();}

document.getElementById('search').addEventListener('input',e=>{q=e.target.value.trim();render();});
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');filter=c.dataset.filter;render();}));

let startY=0;
document.getElementById('modal').addEventListener('touchstart',e=>{startY=e.touches[0].clientY;});
document.getElementById('modal').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-startY>80)document.getElementById('overlay').classList.remove('open');});

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  if(u==='Colfersrl'&&p==='LDZ625'){
    sessionStorage.setItem('cf_auth','1');
    document.getElementById('login-screen').style.display='none';
  }else{
    document.getElementById('lerr').style.display='block';
  }
}
document.getElementById('lu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(sessionStorage.getItem('cf_auth')==='1')document.getElementById('login-screen').style.display='none';

render();
</script>
